<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapToGo Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="root"></div>

  <script>
    const isLocalHost = ["localhost", "127.0.0.1"].includes(window.location.hostname);
    window.TAPTOGO_API_BASE = isLocalHost ? "http://localhost:8080" : window.location.origin;
    window.TAPTOGO_AMAP_KEY = window.TAPTOGO_AMAP_KEY || "";
    window.TAPTOGO_AMAP_SECURITY_CODE = window.TAPTOGO_AMAP_SECURITY_CODE || "";
  </script>
  <script src="https://webapi.amap.com/loader.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="./app-helpers.mjs"></script>
  <script type="text/babel" data-presets="react" src="./app.jsx"></script>
</body>
</html>
